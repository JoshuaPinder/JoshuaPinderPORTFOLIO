<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<title>The Lab</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; -webkit-user-select: none; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: #ecdcb8;
    font-family: "Nunito", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    touch-action: manipulation;
    color: #2a3e2e;
  }
  #app {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
  }

  /* Header bar */
  .header {
    flex: 0 0 auto;
    height: 60px;
    background: linear-gradient(180deg, #7e3ad6, #561e9a);
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 14px 0 16px;
    z-index: 8;
    box-shadow: 0 2px 6px rgba(0,0,0,0.18);
  }
  .menu-btn {
    background: transparent; border: none; cursor: pointer;
    width: 44px; height: 44px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 26px;
  }
  .menu-btn .bars { display: inline-block; width: 22px; height: 16px; position: relative; }
  .menu-btn .bars::before, .menu-btn .bars::after, .menu-btn .bars span {
    content: ""; position: absolute; left: 0; right: 0; height: 3px; background: white; border-radius: 2px;
  }
  .menu-btn .bars::before { top: 0; }
  .menu-btn .bars span { top: 50%; transform: translateY(-50%); }
  .menu-btn .bars::after { bottom: 0; }
  .brand {
    display: flex; flex-direction: column; align-items: flex-start;
    line-height: 0.95;
    color: white; font-weight: 900; font-family: inherit;
    text-shadow: 0 2px 0 rgba(0,0,0,0.18);
  }
  .brand .top { font-size: 13px; letter-spacing: 2px; color: #ffffff; }
  .brand .accent {
    font-size: 26px; letter-spacing: 1.5px;
    color: #84e25e;
    -webkit-text-stroke: 1px #2c5b1a;
    text-shadow: 0 2px 0 #2c5b1a;
  }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .balance-bubble {
    background: white; color: #1f2a3a;
    padding: 7px 14px; border-radius: 18px;
    font-weight: 900; font-size: 14px;
    border: 2px solid #2a1248;
  }
  .heart-btn {
    width: 36px; height: 36px; border-radius: 50%;
    background: white; border: 2px solid #2a1248;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; padding: 0;
  }
  .heart-btn svg { width: 18px; height: 18px; }

  /* HUD overlay (session time / session balance) */
  .hud-overlay {
    position: absolute;
    left: 0; right: 0;
    top: 60px;
    display: flex; justify-content: space-between;
    padding: 6px 14px;
    pointer-events: none;
    z-index: 4;
    font-size: 12px; font-weight: 700;
    color: rgba(40,30,20,0.65);
  }

  .canvas-wrap { flex: 1 1 auto; position: relative; min-height: 0; }
  #game { position: absolute; inset: 0; width: 100%; height: 100%; display: block; cursor: crosshair; }

  /* Bottom controls bar */
  .controls {
    flex: 0 0 auto;
    height: 80px;
    background: linear-gradient(180deg, #7e3ad6, #561e9a);
    border-top: 2px solid rgba(0,0,0,0.18);
    display: flex; align-items: center; justify-content: center;
    gap: 8px;
    padding: 0 10px;
    z-index: 6;
  }
  .info-pill {
    background: #f6f0e0;
    border: none;
    border-radius: 26px;
    padding: 11px 18px;
    font-weight: 800;
    font-size: 14px;
    color: #38374f;
    box-shadow: 0 2px 0 rgba(0,0,0,0.18);
    min-width: 130px;
    text-align: center;
    cursor: default;
    font-family: inherit;
    line-height: 1.15;
  }
  .info-pill.clickable { cursor: pointer; }
  .info-pill .em { color: #ce4658; font-weight: 900; }

  .round-timer {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: white;
    color: #2a1248;
    font-weight: 900; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 2px 0 rgba(0,0,0,0.18);
    flex: 0 0 auto;
    font-family: inherit;
    border: 2px solid rgba(255,255,255,0.5);
  }

  .stake-btn {
    background: #9c47d6;
    width: 46px; height: 46px;
    border-radius: 50%;
    border: none;
    color: white;
    font-size: 26px; font-weight: 900;
    box-shadow: 0 3px 0 rgba(0,0,0,0.28);
    cursor: pointer;
    font-family: inherit;
    line-height: 1;
    transition: transform 0.08s ease;
    flex: 0 0 auto;
  }
  .stake-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.28); }
  .stake-btn:disabled { opacity: 0.55; cursor: not-allowed; }

  .buy-btn {
    background: #d9384a;
    color: white;
    border: none;
    border-radius: 50%;
    width: 72px; height: 72px;
    font-size: 14px;
    font-weight: 900;
    line-height: 1.05;
    text-align: center;
    cursor: pointer;
    font-family: inherit;
    box-shadow: 0 4px 0 rgba(0,0,0,0.28);
    transition: transform 0.08s ease, background 0.15s ease;
    padding: 0 4px;
    flex: 0 0 auto;
  }
  .buy-btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.28); }
  .buy-btn.holding { background: #b03847; }
  .buy-btn.disabled-state { background: #8b8b8b; cursor: default; }

  .balance-pill { color: #38374f; }

  .settings-btn {
    width: 46px; height: 46px;
    border-radius: 50%;
    background: #9c47d6;
    border: none;
    color: white; font-size: 22px;
    box-shadow: 0 3px 0 rgba(0,0,0,0.28);
    cursor: pointer;
    flex: 0 0 auto;
    font-family: inherit;
    display: flex; align-items: center; justify-content: center;
  }
  .settings-btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.28); }

  /* Win pill animation */
  .info-pill.win-flash {
    animation: winflash 0.6s ease;
    color: #ce4658;
  }
  @keyframes winflash {
    0% { transform: scale(1); }
    40% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }

  /* Toast */
  #toast {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0.85);
    background: linear-gradient(180deg, #ffffff, #f4f9f1);
    padding: 18px 32px;
    border-radius: 22px;
    text-align: center;
    font-weight: 900;
    font-size: 26px;
    color: #2a3e2e;
    box-shadow: 0 12px 40px rgba(0,0,0,0.22);
    opacity: 0;
    pointer-events: none;
    transition: transform 0.35s cubic-bezier(.34,1.56,.64,1), opacity 0.25s ease;
    z-index: 10;
    white-space: nowrap;
    border: 2px solid rgba(255,255,255,0.9);
  }
  #toast.show { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  #toast .sub { display:block; font-size: 14px; color: #7a8a7f; font-weight: 700; margin-top: 4px; }

  /* Settings panel */
  .panel {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: white;
    padding: 24px 28px;
    border-radius: 22px;
    box-shadow: 0 14px 44px rgba(0,0,0,0.3);
    z-index: 20;
    display: none;
    min-width: 270px;
    font-weight: 700;
  }
  .panel.show { display: block; }
  .panel h2 { margin-bottom: 14px; font-size: 20px; color: #29bdb1; }
  .panel .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; color: #555; }
  .panel .row input { transform: scale(1.3); margin-left: 10px; }
  .panel button.close {
    margin-top: 14px; width: 100%; padding: 12px;
    background: #29bdb1;
    color: white; border: none; border-radius: 12px;
    font-weight: 800; cursor: pointer; font-size: 15px;
    font-family: inherit;
    box-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }
  .panel .reset-btn {
    background: #f6f0e0; border: none; padding: 8px 14px;
    border-radius: 10px; font-family: inherit; font-weight: 800;
    cursor: pointer; color: #ce4658;
  }

  @media (max-width: 600px) {
    .info-pill { min-width: 80px; font-size: 11px; padding: 8px 10px; }
    .buy-btn { width: 60px; height: 60px; font-size: 11px; }
    .stake-btn, .settings-btn, .round-timer { width: 38px; height: 38px; font-size: 20px; }
    .round-timer { font-size: 11px; }
    .brand .accent { font-size: 22px; }
    .brand .top { font-size: 11px; }
    .controls { gap: 5px; padding: 0 5px; height: 70px; }
    .header { height: 56px; }
  }

  @media (orientation: landscape) and (max-height: 500px) {
    .header { display: none; }
    .controls { height: 64px; gap: 8px; }
    .info-pill { min-width: 130px; font-size: 13px; padding: 9px 16px; }
    .hud-overlay { top: 4px; color: rgba(255,255,255,0.85); text-shadow: 0 1px 2px rgba(0,0,0,0.4); }
    .stake-btn, .settings-btn, .round-timer { width: 42px; height: 42px; }
    .buy-btn { width: 64px; height: 64px; font-size: 13px; }
  }

  @media (orientation: landscape) and (max-height: 380px) {
    .controls { height: 56px; }
    .stake-btn, .settings-btn, .round-timer { width: 38px; height: 38px; font-size: 18px; }
    .buy-btn { width: 56px; height: 56px; font-size: 11px; }
    .info-pill { min-width: 110px; font-size: 12px; padding: 7px 12px; }
  }
</style>
</head>
<body>
  <div id="app">
    <div class="header">
      <button class="menu-btn" id="menuBtn" aria-label="Menu"><span class="bars"><span></span></span></button>
      <div class="brand"><span class="top">the</span><span class="accent">LAB</span></div>
      <div class="header-right">
        <div class="balance-bubble" id="headerBalance">&pound;10.00</div>
        <button class="heart-btn" id="heartBtn" aria-label="Favourite">
          <svg viewBox="0 0 24 24" fill="#e64a6a" xmlns="http://www.w3.org/2000/svg"><path d="M12 21s-7-4.35-9.5-9A5.5 5.5 0 0 1 12 5.5 5.5 5.5 0 0 1 21.5 12C19 16.65 12 21 12 21z"/></svg>
        </button>
      </div>
    </div>

    <div class="canvas-wrap">
      <canvas id="game"></canvas>
      <div class="hud-overlay">
        <span id="sessionTime">session time: --:--</span>
        <span id="sessionBalance">session balance: 0p</span>
      </div>
    </div>

    <div class="controls">
      <div class="round-timer" id="roundTimer">--:--</div>
      <button class="info-pill clickable" id="leftPill">Select stake<br>and buy</button>
      <button class="stake-btn" id="minus" aria-label="Decrease stake">&minus;</button>
      <button class="buy-btn" id="buy">Buy<br>10p</button>
      <button class="stake-btn" id="plus" aria-label="Increase stake">+</button>
      <div class="info-pill balance-pill" id="balancePill">Balance 0p</div>
      <button class="settings-btn" id="settingsBtn" aria-label="Settings">&#9881;</button>
    </div>

    <div id="toast"></div>

    <div class="panel" id="settingsPanel">
      <h2>Settings</h2>
      <div class="row"><span>Music</span><input type="checkbox" id="musicChk" checked></div>
      <div class="row"><span>Sound FX</span><input type="checkbox" id="sfxChk" checked></div>
      <div class="row"><span>Auto-pop on stop</span><input type="checkbox" id="autoFinishChk" checked></div>
      <div class="row"><span>Reset balance</span><button class="reset-btn" id="resetBal">&pound;10</button></div>
      <button class="close" id="closeSettings">Close</button>
    </div>
  </div>

<script>
(function(){
'use strict';

/* =========================================================
   THE LAB — bubble-popping beaker-fill arcade game.
   - 7 beakers with prize values that scale with stake.
   - Multipliers: 1x, 2x, 5x, 10x, 20x, 50x, 500x.
   - Hold-to-pop / pop-all-bubbles / tap-to-pop interactions.
   - Procedural soundtrack and SFX.
   ========================================================= */

const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');

let W = 0, H = 0, DPR = 1;

function resize() {
  DPR = Math.min(window.devicePixelRatio || 1, 2);
  const rect = canvas.getBoundingClientRect();
  W = rect.width;
  H = rect.height;
  canvas.width  = Math.floor(W * DPR);
  canvas.height = Math.floor(H * DPR);
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
  layoutScene();
}
window.addEventListener('resize', function(){ setTimeout(resize, 50); });
window.addEventListener('orientationchange', function(){ setTimeout(resize, 200); });

/* -------------------- Game data -------------------- */
// Multipliers: prize = stake * multiplier.
// Determined from reference: 50p stake -> 50p,£1,£2.50,£5,£10,£25,£250
const BEAKER_MULTIPLIERS = [1, 2, 5, 10, 20, 50, 500];

// Beaker visual definitions (idx 0..6, in left-to-right play order)
const BEAKER_DEFS = [
  // idx, label drawn from prize, color, color2 (light), shape, position, segments to fill, sizeRatio
  { idx: 0, color: '#d670a8', color2: '#e891bb', shape: 'beaker',     loc: 'shelf', segments: 5, size: 0.75 }, // pink   1x
  { idx: 1, color: '#e9a738', color2: '#f0bf6b', shape: 'erlenmeyer', loc: 'shelf', segments: 5, size: 0.85 }, // yellow 2x
  { idx: 2, color: '#84c8c4', color2: '#a8d9d6', shape: 'beaker',     loc: 'shelf', segments: 5, size: 0.78 }, // cyan   5x
  { idx: 3, color: '#7e4fa6', color2: '#9c70be', shape: 'beaker',     loc: 'bench', segments: 6, size: 0.9 }, // purple 10x
  { idx: 4, color: '#4a91cd', color2: '#7eb1da', shape: 'erlenmeyer', loc: 'lifted', segments: 6, size: 1.1 }, // blue   20x  (tallest, on jack)
  { idx: 5, color: '#7ab36a', color2: '#94c485', shape: 'beaker',     loc: 'bench', segments: 6, size: 0.85 }, // green  50x
  { idx: 6, color: '#d34a4a', color2: '#e57878', shape: 'flask',      loc: 'apparatus', segments: 7, size: 1.0 }, // red    500x
];

// Bubble color spawn weights (chance of each color per bubble) + miss weight
// Index aligns with BEAKER_DEFS; last value = 'miss' (no fill)
const BUBBLE_WEIGHTS = [0.28, 0.20, 0.14, 0.10, 0.07, 0.04, 0.012, 0.158]; // last = miss (~16%)

const STAKES = [0.10, 0.20, 0.50, 1.00, 2.00];

const state = {
  balance: 10.00,
  startBalance: 10.00,
  stakeIdx: 0, // 10p default
  playing: false,
  holding: false,
  bubbles: [],
  particles: [],
  beakers: [],
  bubblesToSpawn: 0,
  bubblesOnScreenMax: 16,
  spawnCooldown: 0,
  totalWin: 0,
  finishing: false,
  benchShake: 0,
  pointerEnabled: false,
  jackPhase: 0,
  steamPuffs: [],
  sessionStartMs: Date.now()
};

/* -------------------- Layout -------------------- */
let benchY = 0, shelfY = 0, shelfX1 = 0, shelfX2 = 0;
function layoutScene() {
  state.beakers = [];
  benchY = H * 0.78;
  shelfY = H * 0.50;
  // Left shelf occupies left ~46% of canvas above bench
  shelfX1 = W * 0.05;
  shelfX2 = W * 0.46;

  const stake = STAKES[state.stakeIdx];

  // Slot positions for the 7 beakers
  const positions = [];
  // Beakers 0..2 sit on the shelf
  const shelfCount = 3;
  const shelfSpan = shelfX2 - shelfX1 - 30;
  for (let i = 0; i < shelfCount; i++) {
    const cx = shelfX1 + 20 + (shelfSpan / (shelfCount)) * (i + 0.5);
    positions.push({ cx: cx, baseY: shelfY + 6 });
  }
  // Beakers 3..6 sit on the main bench, distributed across the right ~60%
  const benchCount = 4;
  const benchLeft = W * 0.40;
  const benchRight = W * 0.96;
  const benchSpan = benchRight - benchLeft;
  for (let i = 0; i < benchCount; i++) {
    let cx = benchLeft + (benchSpan / benchCount) * (i + 0.5);
    let baseY = benchY + 4;
    if (BEAKER_DEFS[3 + i].loc === 'lifted') {
      // Scissor jack lift — base raised
      baseY = benchY - H * 0.04;
    }
    positions.push({ cx: cx, baseY: baseY });
  }

  for (let i = 0; i < BEAKER_DEFS.length; i++) {
    const d = BEAKER_DEFS[i];
    const stakeValue = stake * BEAKER_MULTIPLIERS[i];
    const label = formatPrize(stakeValue);

    // Sizing
    const baseH = Math.min(H * 0.18, 130) * d.size;
    let baseW = baseH * (d.shape === 'flask' ? 1.0 : d.shape === 'erlenmeyer' ? 0.85 : 0.78);

    state.beakers.push({
      defIdx: i,
      label: label,
      prize: stakeValue,
      color: d.color,
      color2: d.color2,
      shape: d.shape,
      segments: d.segments,
      loc: d.loc,
      cx: positions[i].cx,
      baseY: positions[i].baseY,
      w: baseW,
      h: baseH,
      fill: 0,
      displayFill: 0,
      glowT: 0,
      shakeT: 0,
      sloshPhase: Math.random() * Math.PI * 2,
      sloshAmp: 0,
      sparkles: [],
      paid: false
    });
  }
}

/* -------------------- Format helpers -------------------- */
function formatPrize(v) {
  if (v < 1) return Math.round(v * 100) + 'p';
  if (Number.isInteger(v)) return '\u00A3' + v;
  // 2.50 -> "£2.50", 7.5 -> "£7.50"
  return '\u00A3' + v.toFixed(2);
}
function formatBalance(v) {
  return '\u00A3' + v.toFixed(2);
}
// Compact balance like "0p" / "50p" / "\u00A31" / "\u00A310.00"
function formatBalanceShort(v) {
  if (v === 0) return '0p';
  if (Math.abs(v) < 1) return Math.round(v * 100) + 'p';
  if (Number.isInteger(v)) return '\u00A3' + v;
  return '\u00A3' + v.toFixed(2);
}
function formatSignedBalance(v) {
  if (v === 0) return '0p';
  const sign = v > 0 ? '+' : '\u2212';
  const abs = Math.abs(v);
  return sign + formatBalanceShort(abs);
}
function formatClock(secs) {
  const m = Math.floor(secs / 60);
  const s = secs % 60;
  return String(m).padStart(2,'0') + ':' + String(s).padStart(2,'0');
}

/* -------------------- Audio -------------------- */
let audioCtx = null;
let musicOn = true, sfxOn = true, autoFinishOn = true;
let musicTimer = null;
let masterMusicGain = null, masterSfxGain = null;

function ensureAudio() {
  if (audioCtx) {
    if (audioCtx.state === 'suspended') audioCtx.resume();
    return;
  }
  try {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterMusicGain = audioCtx.createGain();
    masterMusicGain.gain.value = musicOn ? 0.13 : 0.0;
    masterMusicGain.connect(audioCtx.destination);
    masterSfxGain = audioCtx.createGain();
    masterSfxGain.gain.value = sfxOn ? 0.55 : 0.0;
    masterSfxGain.connect(audioCtx.destination);
    startMusic();
  } catch(e) {}
}

function startMusic() {
  // Light playful loop: I - V - vi - IV in C
  const chords = [
    { bass: 65.41, notes: [261.63, 329.63, 392.00, 523.25] }, // C
    { bass: 49.00, notes: [196.00, 246.94, 293.66, 392.00] }, // G
    { bass: 55.00, notes: [220.00, 261.63, 329.63, 440.00] }, // Am
    { bass: 43.65, notes: [174.61, 220.00, 261.63, 349.23] }  // F
  ];
  let step = 0;
  const STEP_MS = 460;
  function tick() {
    if (!audioCtx) return;
    const chord = chords[Math.floor(step / 4) % chords.length];
    const now = audioCtx.currentTime;

    if (step % 4 === 0) {
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = chord.bass;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.5, now + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.5);
      osc.connect(g); g.connect(masterMusicGain);
      osc.start(now); osc.stop(now + 1.5);
    }
    const arpOrder = [0, 2, 1, 3];
    const freq = chord.notes[arpOrder[step % 4]];
    const o = audioCtx.createOscillator();
    const g2 = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freq;
    g2.gain.setValueAtTime(0, now);
    g2.gain.linearRampToValueAtTime(0.30, now + 0.015);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.5);
    o.connect(g2); g2.connect(masterMusicGain);
    o.start(now); o.stop(now + 0.55);

    if (step % 2 === 1) {
      const s = audioCtx.createOscillator();
      const sg = audioCtx.createGain();
      s.type = 'sine';
      s.frequency.value = freq * 2;
      sg.gain.setValueAtTime(0, now);
      sg.gain.linearRampToValueAtTime(0.10, now + 0.03);
      sg.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      s.connect(sg); sg.connect(masterMusicGain);
      s.start(now); s.stop(now + 0.45);
    }
    step++;
  }
  tick();
  musicTimer = setInterval(tick, STEP_MS);
}

function playPop(size) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  const baseFreq = 950 - Math.min(size, 60) * 6;
  osc.frequency.setValueAtTime(baseFreq * 1.8, t);
  osc.frequency.exponentialRampToValueAtTime(baseFreq * 0.45, t + 0.10);
  g.gain.setValueAtTime(0.0, t);
  g.gain.linearRampToValueAtTime(0.30, t + 0.006);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.16);
  osc.connect(g); g.connect(masterSfxGain);
  osc.start(t); osc.stop(t + 0.18);
}
function playFillTick(strength) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = 'triangle';
  const f0 = 380 + (strength || 0) * 60;
  o.frequency.setValueAtTime(f0, t);
  o.frequency.exponentialRampToValueAtTime(f0 + 200, t + 0.08);
  g.gain.setValueAtTime(0.16, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + 0.13);
  o.connect(g); g.connect(masterSfxGain);
  o.start(t); o.stop(t + 0.15);
}
function playWinJingle(value) {
  if (!audioCtx) return;
  const t0 = audioCtx.currentTime;
  const scale = [523.25, 659.25, 783.99, 1046.50, 1318.51, 1567.98];
  const steps = value >= 50 ? 6 : value >= 10 ? 5 : value >= 2 ? 4 : 3;
  for (let i = 0; i < steps; i++) {
    const t = t0 + i * 0.085;
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'square';
    o.frequency.value = scale[i];
    g.gain.setValueAtTime(0, t);
    g.gain.linearRampToValueAtTime(0.22, t + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    o.connect(g); g.connect(masterSfxGain);
    o.start(t); o.stop(t + 0.3);
  }
}
function playLoseSound() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const notes = [392, 349.23, 311.13];
  for (let i = 0; i < notes.length; i++) {
    const f = notes[i];
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'triangle';
    o.frequency.value = f;
    const st = t + i * 0.10;
    g.gain.setValueAtTime(0, st);
    g.gain.linearRampToValueAtTime(0.14, st + 0.015);
    g.gain.exponentialRampToValueAtTime(0.001, st + 0.22);
    o.connect(g); g.connect(masterSfxGain);
    o.start(st); o.stop(st + 0.27);
  }
}
function playGoldChime() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const freqs = [880, 1318.51, 1760];
  for (let i = 0; i < freqs.length; i++) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = 'sine';
    o.frequency.value = freqs[i];
    g.gain.setValueAtTime(0, t + i * 0.04);
    g.gain.linearRampToValueAtTime(0.18, t + i * 0.04 + 0.01);
    g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.6);
    o.connect(g); g.connect(masterSfxGain);
    o.start(t + i * 0.04); o.stop(t + i * 0.04 + 0.7);
  }
}

/* -------------------- Bubbles -------------------- */
function chooseBubblePayload() {
  // Returns { colorIdx: -1 (miss) or 0..6, isGold: bool }
  const r = Math.random();
  let acc = 0;
  for (let i = 0; i < BUBBLE_WEIGHTS.length; i++) {
    acc += BUBBLE_WEIGHTS[i];
    if (r < acc) {
      if (i >= BEAKER_DEFS.length) return { colorIdx: -1, isGold: false };
      // Tiny chance it becomes a gold-plasma instant-fill bubble
      const isGold = Math.random() < 0.012;
      return { colorIdx: i, isGold: isGold };
    }
  }
  return { colorIdx: -1, isGold: false };
}

function spawnBubble() {
  const payload = chooseBubblePayload();
  // Sizes: small/medium/large
  const roll = Math.random();
  let r;
  if (roll < 0.18) r = 44 + Math.random() * 12; // large
  else if (roll < 0.55) r = 32 + Math.random() * 10; // medium
  else r = 22 + Math.random() * 8; // small

  return {
    x: 30 + Math.random() * (W - 60),
    y: H + r + 10,
    vx: (Math.random() - 0.5) * 0.4,
    vy: -(0.45 + Math.random() * 0.45) - r * 0.0025,
    r: r,
    colorIdx: payload.colorIdx,
    color: payload.colorIdx >= 0 ? BEAKER_DEFS[payload.colorIdx].color : '#cccccc',
    color2: payload.colorIdx >= 0 ? BEAKER_DEFS[payload.colorIdx].color2 : '#e0e0e0',
    isGold: payload.isGold,
    swayPhase: Math.random() * Math.PI * 2,
    swaySpeed: 0.012 + Math.random() * 0.012,
    swayAmp: 0.4 + Math.random() * 0.6,
    wobble: Math.random() * Math.PI * 2,
    rimPhase: Math.random() * Math.PI * 2,
    blobJiggle: Math.random() * Math.PI * 2,
    life: 0,
    popped: false
  };
}

function popBubble(b) {
  if (b.popped) return;
  b.popped = true;

  // Burst particles
  const pCount = 8 + Math.floor(b.r / 6);
  for (let i = 0; i < pCount; i++) {
    const ang = (i / pCount) * Math.PI * 2 + Math.random() * 0.4;
    const spd = 1.5 + Math.random() * 3.0;
    state.particles.push({
      kind: 'spark',
      x: b.x, y: b.y,
      vx: Math.cos(ang) * spd,
      vy: Math.sin(ang) * spd,
      r: 2 + Math.random() * 3,
      color: b.colorIdx >= 0 ? b.color : '#ffffff',
      life: 22 + Math.random() * 8,
      maxLife: 30,
      grav: 0.08
    });
  }
  // Ripple ring
  state.particles.push({
    kind: 'ripple', x: b.x, y: b.y,
    r: b.r, maxR: b.r * 2.4, curR: b.r,
    life: 22, maxLife: 22,
    color: b.colorIdx >= 0 ? b.color : '#ffffff'
  });

  // If miss, no payload
  if (b.colorIdx < 0) {
    playPop(b.r);
    removeBubble(b);
    return;
  }

  if (b.isGold) playGoldChime(); else playPop(b.r);

  // Streaming colored blob arc to beaker
  const beaker = state.beakers[b.colorIdx];
  if (beaker) {
    const targetY = beaker.baseY - beaker.h * (beaker.displayFill / beaker.segments) - 8;
    state.particles.push({
      kind: 'stream',
      x: b.x, y: b.y,
      cx: b.x + (beaker.cx - b.x) * 0.5 + (Math.random() - 0.5) * 80,
      cy: Math.min(b.y, beaker.baseY) - 90 - Math.random() * 30,
      tx: beaker.cx,
      ty: targetY,
      color: b.color,
      color2: b.color2,
      life: 30, maxLife: 30,
      bIdx: beaker.defIdx,
      isGold: b.isGold,
      applied: false, t: 0
    });
  }
  removeBubble(b);
}

function removeBubble(b) {
  const i = state.bubbles.indexOf(b);
  if (i >= 0) state.bubbles.splice(i, 1);
}

function applyFill(beakerIdx, isGold) {
  const beaker = state.beakers[beakerIdx];
  if (!beaker || beaker.paid) return;
  const add = isGold ? beaker.segments : 1;
  beaker.fill = Math.min(beaker.segments, beaker.fill + add);
  beaker.sloshAmp = Math.min(beaker.sloshAmp + 6, 14);
  beaker.shakeT = 6;
  playFillTick(Math.min(4, beaker.fill));
  for (let i = 0; i < (isGold ? 14 : 4); i++) {
    beaker.sparkles.push({
      x: (Math.random() - 0.5) * beaker.w * 0.7,
      y: 0,
      vy: -0.5 - Math.random() * 0.6,
      vx: (Math.random() - 0.5) * 0.6,
      life: 24 + Math.random() * 14,
      maxLife: 38
    });
  }
  if (beaker.fill >= beaker.segments) {
    beaker.glowT = 60;
    beaker.shakeT = 14;
    state.benchShake = 6;
  }
}

/* -------------------- Round control -------------------- */
function roundMaxPrize() {
  const stake = STAKES[state.stakeIdx];
  return stake * BEAKER_MULTIPLIERS[BEAKER_MULTIPLIERS.length - 1];
}

function updateHUD() {
  // Bottom-bar Balance pill
  document.getElementById('balancePill').textContent = 'Balance ' + formatBalanceShort(state.balance);
  // Header balance bubble
  const hb = document.getElementById('headerBalance');
  if (hb) hb.textContent = formatBalance(state.balance);
  // Session balance overlay (delta from session start)
  const sb = document.getElementById('sessionBalance');
  if (sb) sb.textContent = 'session balance: ' + formatSignedBalance(state.balance - state.startBalance);

  // Buy/Hold/Stop button
  const buy = document.getElementById('buy');
  const stake = STAKES[state.stakeIdx];
  if (!state.playing) {
    buy.classList.remove('holding','disabled-state');
    const stakeText = formatPrize(stake);
    buy.innerHTML = 'Buy<br>' + stakeText;
  } else {
    if (state.holding) {
      buy.classList.add('holding');
      buy.classList.remove('disabled-state');
      buy.innerHTML = 'stop';
    } else if (state.finishing) {
      buy.classList.add('disabled-state');
      buy.classList.remove('holding');
      buy.innerHTML = 'wait';
    } else {
      buy.classList.remove('holding','disabled-state');
      buy.innerHTML = 'hold<br>to pop';
    }
  }

  // Stake +/-
  document.getElementById('minus').disabled = state.playing || state.stakeIdx === 0;
  document.getElementById('plus').disabled  = state.playing || state.stakeIdx === STAKES.length - 1;

  // Left pill
  const left = document.getElementById('leftPill');
  if (state.playing) {
    if (state.totalWin > 0) {
      left.innerHTML = 'you win <span class="em">' + formatPrize(state.totalWin) + '</span>';
    } else {
      left.textContent = 'pop all bubbles';
    }
  } else {
    if (state.totalWin > 0) {
      left.innerHTML = 'you win <span class="em">' + formatPrize(state.totalWin) + '</span>';
    } else {
      left.innerHTML = 'Select stake<br>and buy';
    }
  }
}

// Tick HUD (session time + round timer wall clock)
function tickHUD() {
  const elapsedSec = Math.floor((Date.now() - state.sessionStartMs) / 1000);
  const st = document.getElementById('sessionTime');
  if (st) st.textContent = 'session time: ' + formatClock(elapsedSec);
  const rt = document.getElementById('roundTimer');
  if (rt) {
    const d = new Date();
    rt.textContent = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  }
}
setInterval(tickHUD, 1000);
tickHUD();

function startRound() {
  if (state.playing) return;
  ensureAudio();
  const stake = STAKES[state.stakeIdx];
  if (state.balance < stake - 1e-9) {
    showToast('Not enough balance', 'Top up in settings', 1600);
    playLoseSound();
    return;
  }
  state.balance -= stake;
  state.playing = true;
  state.holding = false;
  state.finishing = false;
  state.pointerEnabled = true;
  state.bubblesToSpawn = 26;
  state.spawnCooldown = 0;
  state.totalWin = 0;
  state.bubbles = [];
  state.particles = [];
  // Reset beakers, refresh prizes from current stake
  layoutScene();
  updateHUD();
}

function endRound() {
  state.playing = false;
  state.pointerEnabled = false;
  state.holding = false;
  state.finishing = false;

  // Tally wins from filled beakers
  let total = 0;
  for (let i = 0; i < state.beakers.length; i++) {
    const bk = state.beakers[i];
    if (bk.fill >= bk.segments && !bk.paid) {
      bk.paid = true;
      total += bk.prize;
    }
  }
  if (total > 0) {
    state.totalWin = total;
    state.balance += total;
    showToast('YOU WIN ' + formatPrize(total) + '!', 'Beakers filled', 2400);
    playWinJingle(total);
    flashWinPill();
  } else {
    state.totalWin = 0;
    showToast('No win', 'Try again!', 1300);
    playLoseSound();
  }
  updateHUD();
}

function flashWinPill() {
  const left = document.getElementById('leftPill');
  left.classList.remove('win-flash');
  void left.offsetWidth; // restart animation
  left.classList.add('win-flash');
}

canvas.addEventListener('pointerdown', function(e) {
  ensureAudio();
  if (!state.pointerEnabled) return;
  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  for (let i = state.bubbles.length - 1; i >= 0; i--) {
    const b = state.bubbles[i];
    const dx = x - b.x, dy = y - b.y;
    if (dx*dx + dy*dy <= (b.r + 4) * (b.r + 4)) {
      popBubble(b);
      break;
    }
  }
});

  if (!state.playing) return;
  state.holding = true;

  if (holdInterval) clearInterval(holdInterval);
  holdInterval = setInterval(function(){
    if (state.bubbles.length > 0) {

      let pick = state.bubbles[0];
      for (let i = 1; i < state.bubbles.length; i++) {
        if (state.bubbles[i].y < pick.y) pick = state.bubbles[i];
      }
      popBubble(pick);
    }

/* -------------------- Update loop -------------------- */
let lastT = performance.now();
function update(dtMs) {
  const dt = Math.min(dtMs, 40) / 16.666;
  state.jackPhase += 0.04 * dt;

  if (state.playing) {
    state.spawnCooldown -= dt;
    if (state.spawnCooldown <= 0 &&
        state.bubblesToSpawn > 0 &&
        state.bubbles.length < state.bubblesOnScreenMax) {
      state.bubbles.push(spawnBubble());
      state.bubblesToSpawn--;
      state.spawnCooldown = 9 + Math.random() * 14;
    }
  }

  // Bubble physics
  for (let i = 0; i < state.bubbles.length; i++) {
    const b = state.bubbles[i];
    b.life += dt;
    b.swayPhase += b.swaySpeed * dt;
    b.wobble += 0.07 * dt;
    b.rimPhase += 0.025 * dt;
    b.blobJiggle += 0.05 * dt;
    const sway = Math.sin(b.swayPhase) * b.swayAmp;
    b.vx = sway * 0.55;
    b.vy = Math.max(b.vy - 0.0018 * dt, -1.55);
    b.x += b.vx * dt;
    b.y += b.vy * dt;
    if (b.x < b.r + 4) { b.x = b.r + 4; b.vx = Math.abs(b.vx); }
    if (b.x > W - b.r - 4) { b.x = W - b.r - 4; b.vx = -Math.abs(b.vx); }
  }
  // Off-top bubbles count as missed
  state.bubbles = state.bubbles.filter(function(b){ return b.y + b.r >= -20; });

  // Particles
  for (let i = 0; i < state.particles.length; i++) {
    const p = state.particles[i];
    p.life -= dt;
    if (p.kind === 'spark') {
      p.x += p.vx * dt;
      p.y += p.vy * dt;
      p.vy += p.grav * dt;
      p.vx *= 0.98;
    } else if (p.kind === 'ripple') {
      const t = 1 - p.life / p.maxLife;
      p.curR = p.r + (p.maxR - p.r) * t;
    } else if (p.kind === 'stream') {
      p.t = 1 - p.life / p.maxLife;
      if (p.t >= 1 && !p.applied) {
        p.applied = true;
        applyFill(p.bIdx, p.isGold);
      }
    }
  }
  state.particles = state.particles.filter(function(p){ return p.life > 0; });

  // Beakers update
  for (let i = 0; i < state.beakers.length; i++) {
    const bk = state.beakers[i];
    bk.displayFill += (bk.fill - bk.displayFill) * Math.min(0.18 * dt, 0.9);
    if (bk.glowT > 0) bk.glowT -= dt;
    if (bk.shakeT > 0) bk.shakeT -= dt;
    bk.sloshPhase += 0.085 * dt;
    bk.sloshAmp *= Math.pow(0.93, dt);
    for (let j = 0; j < bk.sparkles.length; j++) {
      const s = bk.sparkles[j];
      s.x += s.vx * dt;
      s.y += s.vy * dt;
      s.life -= dt;
    }
    bk.sparkles = bk.sparkles.filter(function(s){ return s.life > 0; });
  }

  if (state.benchShake > 0) state.benchShake -= 0.4 * dt;

  // Steam puffs above £10 flask
  if (Math.random() < 0.04 * dt) {
    const bk = state.beakers[4];
    if (bk) {
      state.steamPuffs.push({
        x: bk.cx + (Math.random() - 0.5) * 14,
        y: bk.baseY - bk.h - 10,
        r: 8 + Math.random() * 6,
        vy: -0.5 - Math.random() * 0.4,
        life: 90, maxLife: 90,
        drift: (Math.random() - 0.5) * 0.4
      });
    }
  }
  for (let i = 0; i < state.steamPuffs.length; i++) {
    const s = state.steamPuffs[i];
    s.x += s.drift * dt;
    s.y += s.vy * dt;
    s.r += 0.3 * dt;
    s.life -= dt;
  }
  state.steamPuffs = state.steamPuffs.filter(function(s){ return s.life > 0; });

  // End round when no more bubbles or pending streams
  if (state.playing && !state.finishing) {
    const pendingStreams = state.particles.filter(function(p){return p.kind==='stream' && !p.applied;}).length;
    if (state.bubblesToSpawn === 0 && state.bubbles.length === 0 && pendingStreams === 0) {
      state.finishing = true;
      updateHUD();
      // small delay to let last fill animations resolve
      setTimeout(endRound, 700);
    }
  }
}

/* -------------------- Rendering -------------------- */
function drawBackground() {
  // Wall (cream)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#f1e0bd');
  g.addColorStop(1, '#e6d4a4');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Door silhouette (right edge)
  ctx.fillStyle = 'rgba(0,0,0,0.06)';
  ctx.fillRect(W - 30, 30, 18, H * 0.55);

  // Lab coat (left)
  drawLabCoat(W * 0.025, H * 0.10, H * 0.36);

  // Hanging glassware (left top)
  drawHangingGlass(W * 0.16, H * 0.04, H * 0.42);

  // Test tube rack (left mid)
  drawTestTubeRack(W * 0.10, H * 0.18, H * 0.28);

  // Chalkboard (centre back)
  drawChalkboard();

  // Bookshelf (right back)
  drawBookshelf(W * 0.70, H * 0.16, W * 0.26, H * 0.18);

  // Apparatus tubing for £250 flask (drawn early so flask sits over)
  drawHeatingApparatus();

  // Wooden shelf (mid-left)
  drawShelf();

  // Main bench at bottom
  drawBench();

  // Scissor jack under £10 flask
  drawScissorJack();
}

function drawLabCoat(x, y, h) {
  ctx.save();
  ctx.fillStyle = '#fdfdfd';
  ctx.strokeStyle = '#cdc6b3';
  ctx.lineWidth = 1.5;
  // Hanger
  ctx.beginPath();
  ctx.arc(x + 24, y, 4, 0, Math.PI * 2);
  ctx.fillStyle = '#8a7a55';
  ctx.fill();
  // Hook
  ctx.strokeStyle = '#8a7a55';
  ctx.beginPath();
  ctx.moveTo(x + 24, y - 4);
  ctx.bezierCurveTo(x + 24, y - 14, x + 14, y - 14, x + 14, y - 6);
  ctx.stroke();
  // Coat shape
  ctx.fillStyle = '#fdfdfd';
  ctx.strokeStyle = '#cdc6b3';
  ctx.beginPath();
  ctx.moveTo(x + 8, y + 6);
  ctx.lineTo(x + 40, y + 6);
  ctx.lineTo(x + 56, y + 30);
  ctx.lineTo(x + 50, y + h);
  ctx.lineTo(x - 4, y + h);
  ctx.lineTo(x - 8, y + 30);
  ctx.closePath();
  ctx.fill(); ctx.stroke();
  // Lapels
  ctx.beginPath();
  ctx.moveTo(x + 24, y + 6);
  ctx.lineTo(x + 14, y + 60);
  ctx.lineTo(x + 24, y + 90);
  ctx.lineTo(x + 34, y + 60);
  ctx.closePath();
  ctx.fillStyle = '#f0ebd9';
  ctx.fill();
  // Buttons
  ctx.fillStyle = '#bbb19a';
  for (let i = 0; i < 3; i++) {
    ctx.beginPath();
    ctx.arc(x + 24, y + 60 + i * 24, 2, 0, Math.PI * 2);

}

function drawChalkboard() {
  const w = W * 0.34, h = H * 0.30;

  const y = H * 0.10;

  ctx.fillStyle = '#7a4f2c';

  // Board
  ctx.fillStyle = '#3c5a4a';
  roundRect(ctx, x, y, w, h, 4);
  ctx.fill();
  ctx.clip();
  // Faint highlight
  const cg = ctx.createRadialGradient(x + w/2, y + h/2, 30, x + w/2, y + h/2, w);
  cg.addColorStop(0, 'rgba(255,255,255,0.05)');
  cg.addColorStop(1, 'rgba(0,0,0,0.18)');
  ctx.fillStyle = cg;
  ctx.fillRect(x, y, w, h);
  // Chalk benzene + decorations
  ctx.globalAlpha = 0.6;
  ctx.strokeStyle = '#dde8d7';
  ctx.fillStyle = '#dde8d7';
  ctx.lineWidth = 1.5;
  ctx.font = 'bold ' + Math.max(11, Math.floor(w * 0.04)) + 'px Nunito';
  // Big benzene ring centre
  drawBenzene(x + w * 0.5, y + h * 0.45, Math.min(w, h) * 0.18);
  // Side groups
  ctx.fillText('H\u2083C', x + w * 0.18, y + h * 0.30);
  ctx.fillText('CH\u2083', x + w * 0.78, y + h * 0.30);
  ctx.fillText('H\u2083C', x + w * 0.20, y + h * 0.66);
  ctx.fillText('CH\u2083', x + w * 0.78, y + h * 0.66);
  // DNA helix (lower)
  drawHelix(x + w * 0.5, y + h * 0.85, w * 0.25, 12);
  ctx.globalAlpha = 1;
  ctx.restore();
}
function drawBenzene(cx, cy, r) {
  ctx.beginPath();
  for (let i = 0; i < 6; i++) {
    const a = (i / 6) * Math.PI * 2 - Math.PI / 2;
    const x = cx + Math.cos(a) * r;
    const y = cy + Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(cx, cy, r * 0.55, 0, Math.PI * 2);
  ctx.stroke();
}
function drawHelix(cx, cy, w, h) {
  ctx.save();
  ctx.beginPath();
  for (let i = 0; i <= 60; i++) {
    const t = i / 60;
    const x = cx - w/2 + w * t;
    const y = cy + Math.sin(t * Math.PI * 4) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.beginPath();
  for (let i = 0; i <= 60; i++) {
    const t = i / 60;
    const x = cx - w/2 + w * t;
    const y = cy - Math.sin(t * Math.PI * 4) * h;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.stroke();
  // rungs
  for (let i = 1; i < 8; i++) {
    const t = i / 8;
    const x = cx - w/2 + w * t;
    const y1 = cy + Math.sin(t * Math.PI * 4) * h;
    const y2 = cy - Math.sin(t * Math.PI * 4) * h;
    ctx.beginPath();
    ctx.moveTo(x, y1); ctx.lineTo(x, y2);
    ctx.stroke();
  }
  ctx.restore();
}

function drawBookshelf(x, y, w, h) {

  ctx.fillStyle = '#d4b88a';
  ctx.fillRect(x + w * 0.55, y + h * 0.45, 60, 8);
  ctx.fillStyle = '#bfd0e4';
  ctx.fillRect(x + w * 0.55, y + h * 0.45 - 8, 56, 8);
  ctx.fillStyle = '#e5b39e';
  ctx.fillRect(x + w * 0.55, y + h * 0.45 - 16, 50, 8);

}

function drawScissorJack() {

function roundRect(ctx, x, y, w, h, r) {
  const rr = Math.min(r, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x + rr, y);
  ctx.arcTo(x + w, y, x + w, y + h, rr);
  ctx.arcTo(x + w, y + h, x, y + h, rr);
  ctx.arcTo(x, y + h, x, y, rr);
  ctx.arcTo(x, y, x + w, y, rr);
  ctx.closePath();
}

function drawBeakers() {
  for (let i = 0; i < state.beakers.length; i++) drawBeaker(state.beakers[i]);
}
function drawBeaker(bk) {
  const shake = bk.shakeT > 0 ? (Math.random() - 0.5) * bk.shakeT * 0.2 : 0;
  ctx.save();
  ctx.translate(bk.cx + shake, 0);

  const w = bk.w;
  const h = bk.h;
  const topY = bk.baseY - h;
  const botY = bk.baseY;

  // Glow when filled
  if (bk.glowT > 0) {
    const t = bk.glowT / 60;
    ctx.save();
    ctx.globalAlpha = t * 0.65;
    ctx.shadowColor = bk.color;
    ctx.shadowBlur = 36;
    ctx.fillStyle = bk.color;
    ctx.beginPath();
    ctx.ellipse(0, botY - h/2, w*0.9, h*0.85, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  }

  // Glass shape path
  let shapePath;
  if (bk.shape === 'beaker') {
    const hw = w / 2;
    shapePath = function() {
      ctx.beginPath();
      ctx.moveTo(-hw * 1.04, topY + 4);
      ctx.lineTo(-hw * 0.96, topY + 12);
      ctx.lineTo(-hw * 0.94, botY - 8);
      ctx.quadraticCurveTo(-hw * 0.9, botY, -hw * 0.8, botY);
      ctx.lineTo(hw * 0.8, botY);
      ctx.quadraticCurveTo(hw * 0.9, botY, hw * 0.94, botY - 8);
      ctx.lineTo(hw * 0.96, topY + 12);
      ctx.lineTo(hw * 1.04, topY + 4);
    };
  } else if (bk.shape === 'erlenmeyer') {
    const hw = w / 2;
    const neckHW = hw * 0.30;
    const neckY = topY + h * 0.20;
    shapePath = function() {
      ctx.beginPath();
      ctx.moveTo(-neckHW, topY);
      ctx.lineTo(-neckHW, neckY);
      ctx.lineTo(-hw * 0.98, botY - 8);
      ctx.quadraticCurveTo(-hw, botY, -hw * 0.9, botY);
      ctx.lineTo(hw * 0.9, botY);
      ctx.quadraticCurveTo(hw, botY, hw * 0.98, botY - 8);
      ctx.lineTo(neckHW, neckY);
      ctx.lineTo(neckHW, topY);
    };
  } else {
    // Round-bottom flask
    const hw = w / 2;
    const neckHW = hw * 0.20;
    const neckBottom = topY + h * 0.30;
    const bulbR = hw * 0.95;
    const bulbCY = botY - bulbR + 4;
    shapePath = function() {
      ctx.beginPath();
      ctx.moveTo(-neckHW, topY);
      ctx.lineTo(-neckHW, neckBottom);
      ctx.arc(0, bulbCY, bulbR, Math.PI * 0.92, Math.PI * 0.08, true);
      ctx.lineTo(neckHW, topY);
    };
  }

  // Liquid clip
  ctx.save();
  shapePath();
  ctx.closePath();
  ctx.clip();

  const ratio = bk.displayFill / bk.segments;
  const liquidTop = botY - (botY - topY) * ratio;
  if (ratio > 0.005) {
    const lg = ctx.createLinearGradient(0, liquidTop, 0, botY);
    lg.addColorStop(0, bk.color2);
    lg.addColorStop(1, bk.color);
    ctx.fillStyle = lg;
    ctx.fillRect(-w, liquidTop, w * 2, botY - liquidTop + 4);
    // Sloshing surface
    ctx.beginPath();
    const amp = Math.min(2 + bk.sloshAmp * 0.4, 6);
    ctx.moveTo(-w, liquidTop);
    for (let x = -w; x <= w; x += 6) {
      const yy = liquidTop + Math.sin((x * 0.08) + bk.sloshPhase) * amp;
      ctx.lineTo(x, yy);
    }
    ctx.lineTo(w, botY);
    ctx.lineTo(-w, botY);
    ctx.closePath();
    ctx.fillStyle = bk.color;
    ctx.fill();
    // Surface highlight
    ctx.fillStyle = 'rgba(255,255,255,0.30)';
    ctx.fillRect(-w * 0.4, liquidTop - 1, w * 0.8, 2);
  }

  // Segment lines (white)
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth = 2;
  for (let i = 1; i <= bk.segments; i++) {
    const y = botY - (botY - topY) * (i / bk.segments);
    ctx.beginPath();
    ctx.moveTo(-w * 0.46, y);
    ctx.lineTo(w * 0.46, y);
    ctx.stroke();
  }
  // Yellow win line at top segment
  const winY = botY - (botY - topY) * 1.0;
  ctx.strokeStyle = '#f7c948';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(-w * 0.46, winY + 2);
  ctx.lineTo(w * 0.46, winY + 2);
  ctx.stroke();

  // Inner bubbles in liquid
  if (ratio > 0.05) {
    const nb = 3;
    for (let i = 0; i < nb; i++) {
      const t = ((performance.now() / 700) + i * 0.33) % 1;
      const bx = Math.sin(i * 3 + performance.now() / 900) * w * 0.25;
      const by = botY - (botY - liquidTop - 6) * t - 4;
      ctx.fillStyle = 'rgba(255,255,255,0.4)';
      ctx.beginPath();
      ctx.arc(bx, by, 2 + (1 - t) * 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  // Sparkles at surface
  for (let i = 0; i < bk.sparkles.length; i++) {
    const s = bk.sparkles[i];
    const a = Math.max(0, s.life / s.maxLife);
    ctx.fillStyle = 'rgba(255,255,255,' + a.toFixed(2) + ')';
    ctx.beginPath();
    ctx.arc(s.x, liquidTop + s.y, 2, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore(); // end clip

  // Value label
  const labelY = liquidTop + (botY - liquidTop) * 0.55;
  const labelVisible = ratio > 0.18;
  const labelTargetY = labelVisible ? labelY : botY - h * 0.30;
  ctx.font = '900 ' + Math.floor(w * 0.30) + 'px Nunito';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.lineWidth = 3;
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.fillStyle = labelVisible ? '#ffffff' : 'rgba(255,255,255,0.55)';
  ctx.strokeText(bk.label, 0, labelTargetY);
  ctx.fillText(bk.label, 0, labelTargetY);

  // Glass outline
  shapePath();
  ctx.strokeStyle = 'rgba(40,55,65,0.45)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // Glass highlight
  ctx.save();
  shapePath();
  ctx.closePath();
  ctx.clip();
  const hg = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  hg.addColorStop(0, 'rgba(255,255,255,0.0)');
  hg.addColorStop(0.18, 'rgba(255,255,255,0.32)');
  hg.addColorStop(0.32, 'rgba(255,255,255,0.0)');
  ctx.fillStyle = hg;
  ctx.fillRect(-w, topY, w*2, botY - topY + 6);
  const hg2 = ctx.createLinearGradient(-w/2, 0, w/2, 0);
  hg2.addColorStop(0.85, 'rgba(255,255,255,0.0)');
  hg2.addColorStop(1.0, 'rgba(255,255,255,0.22)');
  ctx.fillStyle = hg2;
  ctx.fillRect(-w, topY, w*2, botY - topY + 6);
  ctx.restore();

  ctx.restore();
}

function drawBubbles() {
  for (let i = 0; i < state.bubbles.length; i++) drawBubble(state.bubbles[i]);
}

function drawBubble(b) {
  const wobbleRx = 1 + Math.sin(b.wobble) * 0.05;
  const wobbleRy = 1 + Math.cos(b.wobble * 1.1) * 0.05;
  ctx.save();
  ctx.translate(b.x, b.y);
  ctx.scale(wobbleRx, wobbleRy);

  // Gold plasma aura
  if (b.isGold) {
    ctx.save();
    const glowT = (Math.sin(performance.now() / 120) + 1) / 2;
    ctx.shadowColor = '#ffe14a';
    ctx.shadowBlur = 18 + glowT * 18;
    ctx.fillStyle = 'rgba(255, 225, 74, 0.30)';
    ctx.beginPath();
    ctx.arc(0, 0, b.r + 6, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  // Bubble body — translucent with rainbow refraction rim
  ctx.beginPath();
  ctx.arc(0, 0, b.r, 0, Math.PI * 2);
  // Inner light fill (almost transparent white-ish)
  const bodyGrad = ctx.createRadialGradient(-b.r * 0.3, -b.r * 0.4, b.r * 0.1, 0, 0, b.r);
  bodyGrad.addColorStop(0, 'rgba(255,255,255,0.6)');
  bodyGrad.addColorStop(0.55, 'rgba(255,255,255,0.18)');
  bodyGrad.addColorStop(1, 'rgba(255,255,255,0.05)');
  ctx.fillStyle = bodyGrad;
  ctx.fill();

  // Rainbow rim — multiple coloured arcs offset
  const rimColors = ['#ff7aa5', '#ffd23f', '#7ec4d6', '#a3d27c', '#b88ce8', '#ff9b6a'];
  ctx.lineWidth = 3;
  for (let i = 0; i < rimColors.length; i++) {
    const phase = b.rimPhase + i * (Math.PI * 2 / rimColors.length);
    const start = phase;
    const end = phase + Math.PI / 3.2;
    ctx.strokeStyle = hexWithAlpha(rimColors[i], 0.55);
    ctx.beginPath();
    ctx.arc(0, 0, b.r - 1.2, start, end);
    ctx.stroke();
  }
  // Outer glass edge
  ctx.lineWidth = 1.4;
  ctx.strokeStyle = 'rgba(70,90,100,0.28)';
  ctx.beginPath();
  ctx.arc(0, 0, b.r, 0, Math.PI * 2);
  ctx.stroke();

  // Specular highlights
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.beginPath();
  ctx.ellipse(-b.r * 0.36, -b.r * 0.46, b.r * 0.22, b.r * 0.13, -0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.55)';
  ctx.beginPath();
  ctx.arc(b.r * 0.3, b.r * 0.35, b.r * 0.07, 0, Math.PI * 2);
  ctx.fill();

  // Inner colored payload blob (visible inside bubble before pop)
  if (b.colorIdx >= 0) {
    const blobR = b.r * 0.36;
    const ox = Math.sin(b.blobJiggle) * b.r * 0.10;
    const oy = Math.cos(b.blobJiggle * 1.1) * b.r * 0.10;
    const bg = ctx.createRadialGradient(ox - blobR * 0.3, oy - blobR * 0.4, blobR * 0.2, ox, oy, blobR);
    bg.addColorStop(0, b.color2);
    bg.addColorStop(1, b.color);
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(ox, oy, blobR, 0, Math.PI * 2);
    ctx.fill();
    // tiny highlight
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.beginPath();
    ctx.arc(ox - blobR * 0.35, oy - blobR * 0.4, blobR * 0.18, 0, Math.PI * 2);
    ctx.fill();
  }

  // Gold star marker
  if (b.isGold) {
    ctx.fillStyle = '#fff5b8';
    ctx.font = '900 ' + Math.floor(b.r * 0.95) + 'px Nunito';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('\u2605', 0, 1);
  }

  ctx.restore();
}

function drawParticles() {
  for (let i = 0; i < state.particles.length; i++) {
    const p = state.particles[i];
    if (p.kind === 'spark') {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = hexWithAlpha(p.color, a);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * a, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.kind === 'ripple') {
      const a = Math.max(0, p.life / p.maxLife);
      ctx.strokeStyle = hexWithAlpha(p.color, a * 0.7);
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.curR || p.r, 0, Math.PI * 2);
      ctx.stroke();
    } else if (p.kind === 'stream') {
      const t = Math.min(1, p.t);
      const x = (1-t)*(1-t)*p.x + 2*(1-t)*t*p.cx + t*t*p.tx;
      const y = (1-t)*(1-t)*p.y + 2*(1-t)*t*p.cy + t*t*p.ty;
      const grad = ctx.createRadialGradient(x, y, 0, x, y, 8);
      grad.addColorStop(0, p.color2 || p.color);
      grad.addColorStop(1, p.color);
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(x, y, 5, 0, Math.PI * 2);
      ctx.fill();
      // Trail droplets
      ctx.fillStyle = hexWithAlpha(p.color, 0.45);
      for (let k = 1; k <= 4; k++) {
        const tt = Math.max(0, t - k * 0.05);
        const tx = (1-tt)*(1-tt)*p.x + 2*(1-tt)*tt*p.cx + tt*tt*p.tx;
        const ty = (1-tt)*(1-tt)*p.y + 2*(1-tt)*tt*p.cy + tt*tt*p.ty;
        ctx.beginPath();
        ctx.arc(tx, ty, 3 - k * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }
  }
}

function hexWithAlpha(hex, a) {
  const h = hex.replace('#','');
  const r = parseInt(h.substring(0,2),16);
  const g = parseInt(h.substring(2,4),16);
  const b = parseInt(h.substring(4,6),16);
  return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
}

/* -------------------- Main loop -------------------- */
function frame(now) {
  const dt = now - lastT;
  lastT = now;
  update(dt);

  ctx.clearRect(0, 0, W, H);
  drawBackground();
  drawBeakers();
  drawSteam();
  drawBubbles();
  drawParticles();

  requestAnimationFrame(frame);
}

/* -------------------- Boot -------------------- */
resize();
updateHUD();
requestAnimationFrame(function(t){ lastT = t; frame(t); });

// Audio unlock
window.addEventListener('pointerdown', ensureAudio, { once: true });
window.addEventListener('keydown', ensureAudio, { once: true });

})();
</script>
