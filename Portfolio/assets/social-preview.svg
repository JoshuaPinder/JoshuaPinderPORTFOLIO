<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Joshua Pinder Portfolio Preview</title>
  <desc id="desc">Developer portfolio cover image with deep green and purple gradient, name, and backend-focused tagline.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#050e0c"/>
      <stop offset="55%" stop-color="#0a1d19"/>
      <stop offset="100%" stop-color="#110b1f"/>
    </linearGradient>
    <radialGradient id="g1" cx="20%" cy="25%" r="50%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity=".42"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="80%" cy="25%" r="45%">
      <stop offset="0%" stop-color="#0f766e" stop-opacity=".38"/>
      <stop offset="100%" stop-color="#0f766e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c3aed"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>
  <g opacity=".18" stroke="#86b19b">
    <path d="M0 480 C180 430 340 520 520 470 C720 410 900 500 1200 430" fill="none" stroke-width="2"/>
    <path d="M0 520 C170 470 360 560 550 510 C760 450 930 540 1200 470" fill="none" stroke-width="2"/>
  </g>
  <g transform="translate(92 114)">
    <text x="0" y="0" fill="#e7dcfb" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="33" font-weight="600" letter-spacing="1.8">
      JOSHUA PINDER
    </text>
    <text x="0" y="90" fill="#f6edff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="84" font-weight="800">
      Computing Portfolio
    </text>
    <rect x="0" y="126" width="620" height="6" rx="3" fill="url(#line)"/>
    <text x="0" y="202" fill="#c9b8df" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="38" font-weight="500">
      Backend development · Full-stack mobile delivery
    </text>
    <text x="0" y="274" fill="#b6aac8" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="30" font-weight="500">
      Shipped projects, practical systems, and product-focused engineering
    </text>
  </g>
  <g transform="translate(905 454)">
    <rect x="0" y="0" width="210" height="92" rx="16" fill="rgba(13,27,24,.72)" stroke="rgba(102,158,126,.62)"/>
    <text x="22" y="38" fill="#f0e5ff" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="26" font-weight="700">Open to</text>
    <text x="22" y="69" fill="#9de7cf" font-family="Segoe UI, Inter, Arial, sans-serif" font-size="24" font-weight="700">engineering roles</text>
  </g>
  <circle cx="1082" cy="108" r="44" fill="rgba(124,58,237,.22)" filter="url(#softGlow)"/>
  <circle cx="1028" cy="86" r="14" fill="rgba(16,185,129,.52)"/>
</svg>
